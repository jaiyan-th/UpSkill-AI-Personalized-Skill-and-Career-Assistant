<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpSkill AI | Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">

    <div class="logo-container">
        <div class="logo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-3H8v-3h3v-3h2v3h3v3h-3v3h-2z"/></svg>
        </div>
        <h1>UpSkill AI</h1>
        <p>Start your career transformation</p>
    </div>

    <div class="auth-panel">
        <div id="error-msg" style="display:none; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#ef4444; padding:0.75rem 1rem; border-radius:8px; font-size:0.85rem; margin-bottom:1rem;"></div>
        <form id="register-form">
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <div class="input-icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <input type="text" id="fullname" placeholder="John Doe" required>
                </div>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6">
                </div>
            </div>
            <button type="submit" id="submit-btn" class="btn-primary" style="margin-top:0.5rem;">Create Account</button>
        </form>
    </div>

    <div class="auth-footer">Already have an account? <a href="index.html">Sign in</a></div>

<script src="js/api-v2.js"></script>
<script>
    // Clear legacy localStorage tokens
    localStorage.removeItem('upskill_token');
    localStorage.removeItem('upskill_user');
    if (API.auth.isLoggedIn()) window.location.href = 'home.html';

    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const errEl = document.getElementById('error-msg');
        errEl.style.display = 'none';
        API.setLoading(btn, true, 'Creating account...');
        
        try {
            const response = await API.auth.register(
                document.getElementById('fullname').value,
                document.getElementById('email').value,
                document.getElementById('password').value
            );
            
            if (response.success) {
                API.showToast('Registration successful!', 'success');
                window.location.href = 'home.html';
            }
        } catch(err) {
            // Error already shown via toast
            console.error('Registration failed:', err);
        } finally {
            API.setLoading(btn, false);
        }
    });
</script>
</body>
</html>
